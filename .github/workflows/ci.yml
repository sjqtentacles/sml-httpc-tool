name: CI
# This is an IMPURE tool (real TCP sockets). CI only COMPILES it -- it never
# makes network requests and there is no deterministic test suite. The protocol
# logic is tested in the pure sml-httpc core.
on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
jobs:
  mlton:
    name: MLton (compile CLI)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install MLton
        run: sudo apt-get update && sudo apt-get install -y mlton
      - name: Build the httpc CLI
        run: make build
  polyml:
    name: Poly/ML (compile sources)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Poly/ML
        run: sudo apt-get update && sudo apt-get install -y polyml libpolyml-dev
      - name: Compile-check under Poly/ML
        run: make poly-check
